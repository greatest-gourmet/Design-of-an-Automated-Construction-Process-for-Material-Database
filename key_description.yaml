# ===== Top-Level Keys =====
primary_signature: "Data format: string or null. Concept: This key stores the canonical identifier of the primary superconducting research target in the paper and represents the main entity used for downstream identification, linking, and retrieval of extracted superconducting data. Notes: This target may be a single material or formula, an explicit formula family or substitution series treated as one system, or a stack/interface/heterostructure architecture treated as one target. It is recorded as a normalized formula-based or stack/interface-based system signature. It may coincide with an in-paper material or architecture mention when that mention already expresses the canonical target, but it does not record arbitrary material mentions, sample labels, background materials, substrates, controls, or literature-only comparison systems."
material_info: "Concept: The information under this key is centered on the main material represented by primary_signature."
section5: "Concept: The information under this key records paper-level theory- and mechanism-related information about superconductivity discussed in the paper."
paper_info: "Concept: The information under this key records metadata for the paper and resource information reported in the paper."

# ===== Material Information =====
material_info.section0: "Concept: The information under this key records general material information for the primary superconducting system represented by primary_signature, including electronic-state tuning mechanisms, carrier concentration, secondary phases, and stack or interface architecture."
material_info.section0.electronic_state_tuning_mechanism: "Data format: array of objects. Concept: The information under this key records explicitly stated tuning mechanisms used to modify the electronic state of the primary superconducting system represented by primary_signature, including compositional tuning, defect tuning, electrostatic gating, interface-driven charge transfer, and other explicitly stated tuning routes. Notes: Each item represents one distinct electronic-state tuning mechanism record."
material_info.section0.electronic_state_tuning_mechanism.tuning_type: "Data format: string. Concept: This key identifies the explicit category of one electronic-state tuning mechanism record, such as substitution, oxygen nonstoichiometry, vacancy defect, intercalation, electrostatic gating, or interface charge transfer. Notes: It records the tuning route category, not the dopant name or parameter symbol."
material_info.section0.electronic_state_tuning_mechanism.dopant_defect: "Data format: string. Concept: This key records the explicitly stated dopant species or defect acting as the tuning agent for one electronic-state tuning mechanism record in the primary superconducting system represented by primary_signature."
material_info.section0.electronic_state_tuning_mechanism.parameter: "Data format: string. Concept: This key records the parameter symbol or parameter name explicitly used for one electronic-state tuning mechanism record, such as x, δ, y, or gate voltage."
material_info.section0.electronic_state_tuning_mechanism.stoichiometry: "Data format: string. Concept: This key records the explicit composition, formula, or composition expression associated with one electronic-state tuning mechanism record, including parameter values or ranges when stated. Notes: It is recorded as written in the paper rather than normalized, and for non-compositional tuning it appears only when an explicit formula or composition is given for the tuned layer or sample."
material_info.section0.electronic_state_tuning_mechanism.carrier_effect: "Data format: string. Concept: This key records the explicitly stated carrier-type effect associated with one electronic-state tuning mechanism record in the primary superconducting system represented by primary_signature, such as electron, hole, none_isovalent, mixed_or_ambiguous, or unknown. Notes: It reflects only an explicitly stated carrier effect and is not inferred from chemistry alone."

material_info.section0.carrier_concentration: "Data format: array of objects. Concept: The information under this key records explicitly stated carrier concentration or carrier level values for the primary superconducting system represented by primary_signature. Notes: Each item represents one distinct carrier concentration or level record. It records carrier values given directly in the paper and does not represent composition parameters inferred as carrier density."
material_info.section0.carrier_concentration.level: "Data format: number or string. Concept: This key records the carrier concentration or carrier level value for one carrier concentration or level record, exactly as stated in the paper."
material_info.section0.carrier_concentration.unit: "Data format: string. Concept: This key records the unit of the carrier concentration or carrier level for one carrier concentration or level record, such as holes/Cu, e/Fe, cm^-2, or cm^-3."
material_info.section0.carrier_concentration.basis: "Data format: string. Concept: This key records the explicit basis, normalization, or determination reference for one carrier concentration or level record, such as per Cu, per Fe, sheet density, bulk density, or Hall-derived density."
material_info.section0.carrier_concentration.conditions: "Data format: string. Concept: This key records the explicit condition attached to one carrier concentration or level record, such as temperature, pressure, gate voltage, or doping state. Notes: It distinguishes when the value for that record applies, rather than what the value is normalized to."

material_info.section0.secondary_phases: "Data format: array of objects. Concept: The information under this key records explicitly stated secondary, additive, impurity, or composite phases present in the sample of the primary superconducting system represented by primary_signature. Notes: Each item represents one distinct secondary-phase record. It refers to phases identified within the sample and does not include substrates, electrodes, or external components unless the paper explicitly treats them as sample phases."
material_info.section0.secondary_phases.phase: "Data format: string. Concept: This key records the name or formula for one secondary-phase record."
material_info.section0.secondary_phases.role: "Data format: string. Concept: This key records the explicit role label for one secondary-phase record, such as impurity phase, secondary phase, precipitate, or additive."
material_info.section0.secondary_phases.fraction: "Data format: object. Concept: The information under this key records the explicitly stated amount for one secondary-phase record."
material_info.section0.secondary_phases.fraction.value: "Data format: number or string. Concept: This key records the reported fraction value for one secondary-phase record."
material_info.section0.secondary_phases.fraction.unit: "Data format: string. Concept: This key records the unit of the secondary-phase fraction for one secondary-phase record, such as wt.%, vol.%, or mol.%."

material_info.section0.stack_descriptor: "Data format: array of objects. Concept: The information under this key records explicitly stated layered, stacked, interface, heterostructure, or superlattice architectures for the primary superconducting system represented by primary_signature. Notes: Each item represents one distinct stack descriptor record. It describes sample architecture rather than general crystal structure."
material_info.section0.stack_descriptor.architecture: "Data format: string. Concept: This key records a short description of the overall stack or layered architecture for one stack descriptor record."
material_info.section0.stack_descriptor.layers: "Data format: array of objects. Concept: The information under this key records the explicitly stated layer-by-layer composition for one stack descriptor record. Notes: Each item represents one distinct layer record within that stack descriptor record."
material_info.section0.stack_descriptor.layers.material: "Data format: string. Concept: This key records the material name for one layer record."
material_info.section0.stack_descriptor.layers.role: "Data format: string. Concept: This key records the explicit functional role for one layer record, such as film, substrate, buffer, cap, spacer, or superconducting layer."
material_info.section0.stack_descriptor.layers.thickness: "Data format: number or string. Concept: This key records the explicitly stated thickness value for one layer record."
material_info.section0.stack_descriptor.layers.unit: "Data format: string. Concept: This key records the unit of the thickness for one layer record, such as nm or uc."
material_info.section0.stack_descriptor.periodicity: "Data format: string. Concept: This key records the explicit repetition or superlattice period information for one stack descriptor record."
material_info.section0.stack_descriptor.notes: "Data format: string. Concept: This key records a very short additional stack-specific detail for one stack descriptor record when it does not belong under the architecture, layers, or periodicity keys. Notes: It is typically a brief phrase copied from the paper rather than a generic summary."

material_info.section1: "Concept: The information under this key records explicitly stated critical values and Ginzburg-Landau-related superconducting parameters for the primary superconducting system represented by primary_signature."
material_info.section1.Tc: "Data format: array of objects. Concept: The information under this key records explicitly stated superconducting transition temperature values for the primary superconducting system represented by primary_signature. Notes: Each item represents one distinct Tc record under a specific explicitly stated context. Because Tc itself is the temperature value, this record has no separate temperature condition sub-key."
material_info.section1.Tc.value: "Data format: string. Concept: This key records one superconducting transition temperature value exactly as stated in the paper, including its original unit and any approximation symbols."
material_info.section1.Tc.magnetic_field: "Data format: string. Concept: This key records the explicitly stated applied magnetic field for one Tc record. Notes: It appears only when the paper explicitly states a magnetic field condition. If no magnetic field condition is stated, this key will be omitted."
material_info.section1.Tc.pressure: "Data format: string. Concept: This key records the explicitly stated applied pressure for one Tc record. Notes: It appears only when the paper explicitly states a pressure condition. If no pressure condition is stated, this key will be omitted."
material_info.section1.Tc.direction: "Data format: string. Concept: This key records the explicitly stated measurement direction or orientation for one Tc record, copied as written in the paper. Notes: It preserves the original notation rather than a normalized direction label."
material_info.section1.Tc.figure: "Data format: string. Concept: This key records the explicit figure identifier linked to one Tc record. Notes: It appears only when the paper text explicitly links that Tc value to a specific figure and preserves the figure label as written."
material_info.section1.Tc.characteristics: "Data format: string. Concept: This key records additional distinguishing information for one Tc record that is not covered by the structured condition keys, such as sample type, doping state, measurement method, criterion, or analysis method. Notes: It does not repeat the Tc value, magnetic field, pressure, direction, or figure information already recorded elsewhere in the same Tc record."

material_info.section1.Jc: "Data format: array of objects. Concept: The information under this key records explicitly stated critical current density values for the primary superconducting system represented by primary_signature. Notes: Each item represents one distinct Jc record under a specific explicitly stated context."
material_info.section1.Jc.value: "Data format: string. Concept: This key records one critical current density value exactly as stated in the paper, including its original unit and any approximation symbols."
material_info.section1.Jc.temperature: "Data format: string. Concept: This key records the explicitly stated measurement temperature for one Jc record. Notes: It appears only when the paper explicitly states a temperature condition. If no temperature condition is stated, this key will be omitted."
material_info.section1.Jc.magnetic_field: "Data format: string. Concept: This key records the explicitly stated applied magnetic field for one Jc record. Notes: It appears only when the paper explicitly states a magnetic field condition. If no magnetic field condition is stated, this key will be omitted."
material_info.section1.Jc.pressure: "Data format: string. Concept: This key records the explicitly stated applied pressure for one Jc record. Notes: It appears only when the paper explicitly states a pressure condition. If no pressure condition is stated, this key will be omitted."
material_info.section1.Jc.direction: "Data format: string. Concept: This key records the explicitly stated measurement direction or orientation for one Jc record, copied as written in the paper. Notes: It preserves the original notation rather than a normalized direction label."
material_info.section1.Jc.figure: "Data format: string. Concept: This key records the explicit figure identifier linked to one Jc record. Notes: It appears only when the paper text explicitly links that Jc value to a specific figure and preserves the figure label as written."
material_info.section1.Jc.characteristics: "Data format: string. Concept: This key records additional distinguishing information for one Jc record that is not covered by the structured condition keys, such as sample type, doping state, measurement method, criterion, or analysis method. Notes: It does not repeat the Jc value, temperature, magnetic field, pressure, direction, or figure information already recorded elsewhere in the same Jc record."

material_info.section1.Hc1: "Data format: array of objects. Concept: The information under this key records explicitly stated lower critical field values for the primary superconducting system represented by primary_signature. Notes: Each item represents one distinct Hc1 record under a specific explicitly stated context. Because Hc1 itself is the field value, this record has no separate magnetic_field condition sub-key."
material_info.section1.Hc1.value: "Data format: string. Concept: This key records one lower critical field value exactly as stated in the paper, including its original unit and any approximation symbols. Notes: It records Hc1 only and is distinct from Hc2 or Hc."
material_info.section1.Hc1.temperature: "Data format: string. Concept: This key records the explicitly stated measurement temperature for one Hc1 record. Notes: It appears only when the paper explicitly states a temperature condition. If no temperature condition is stated, this key will be omitted."
material_info.section1.Hc1.pressure: "Data format: string. Concept: This key records the explicitly stated applied pressure for one Hc1 record. Notes: It appears only when the paper explicitly states a pressure condition. If no pressure condition is stated, this key will be omitted."
material_info.section1.Hc1.direction: "Data format: string. Concept: This key records the explicitly stated field direction or orientation for one Hc1 record, copied as written in the paper. Notes: It preserves the original notation rather than a normalized direction label."
material_info.section1.Hc1.figure: "Data format: string. Concept: This key records the explicit figure identifier linked to one Hc1 record. Notes: It appears only when the paper text explicitly links that Hc1 value to a specific figure and preserves the figure label as written."
material_info.section1.Hc1.characteristics: "Data format: string. Concept: This key records additional distinguishing information for one Hc1 record that is not covered by the structured condition keys, such as sample type, criterion, or analysis method. Notes: It does not repeat the Hc1 value, temperature, pressure, direction, or figure information already recorded elsewhere in the same Hc1 record."

material_info.section1.Hc2: "Data format: array of objects. Concept: The information under this key records explicitly stated upper critical field values for the primary superconducting system represented by primary_signature. Notes: Each item represents one distinct Hc2 record under a specific explicitly stated context. Because Hc2 itself is the field value, this record has no separate magnetic_field condition sub-key."
material_info.section1.Hc2.value: "Data format: string. Concept: This key records one upper critical field value exactly as stated in the paper, including its original unit and any approximation symbols. Notes: It records Hc2 only and is distinct from Hc1 or Hc."
material_info.section1.Hc2.temperature: "Data format: string. Concept: This key records the explicitly stated measurement temperature for one Hc2 record. Notes: It appears only when the paper explicitly states a temperature condition. If no temperature condition is stated, this key will be omitted."
material_info.section1.Hc2.pressure: "Data format: string. Concept: This key records the explicitly stated applied pressure for one Hc2 record. Notes: It appears only when the paper explicitly states a pressure condition. If no pressure condition is stated, this key will be omitted."
material_info.section1.Hc2.direction: "Data format: string. Concept: This key records the explicitly stated field direction or orientation for one Hc2 record, copied as written in the paper. Notes: It preserves the original notation rather than a normalized direction label."
material_info.section1.Hc2.figure: "Data format: string. Concept: This key records the explicit figure identifier linked to one Hc2 record. Notes: It appears only when the paper text explicitly links that Hc2 value to a specific figure and preserves the figure label as written."
material_info.section1.Hc2.characteristics: "Data format: string. Concept: This key records additional distinguishing information for one Hc2 record that is not covered by the structured condition keys, such as extrapolation method, sample type, criterion, or analysis method. Notes: It does not repeat the Hc2 value, temperature, pressure, direction, or figure information already recorded elsewhere in the same Hc2 record."

material_info.section1.Hc: "Data format: array of objects. Concept: The information under this key records explicitly stated thermodynamic critical field values for the primary superconducting system represented by primary_signature. Notes: Each item represents one distinct Hc record under a specific explicitly stated context, typically for a Type-I superconductor. Because Hc itself is the field value, this record has no separate magnetic_field condition sub-key."
material_info.section1.Hc.value: "Data format: string. Concept: This key records one thermodynamic critical field value exactly as stated in the paper, including its original unit and any approximation symbols. Notes: It records Hc only and is distinct from Hc1 or Hc2."
material_info.section1.Hc.temperature: "Data format: string. Concept: This key records the explicitly stated measurement temperature for one Hc record. Notes: It appears only when the paper explicitly states a temperature condition. If no temperature condition is stated, this key will be omitted."
material_info.section1.Hc.pressure: "Data format: string. Concept: This key records the explicitly stated applied pressure for one Hc record. Notes: It appears only when the paper explicitly states a pressure condition. If no pressure condition is stated, this key will be omitted."
material_info.section1.Hc.direction: "Data format: string. Concept: This key records the explicitly stated field direction or orientation for one Hc record, copied as written in the paper. Notes: It preserves the original notation rather than a normalized direction label."
material_info.section1.Hc.figure: "Data format: string. Concept: This key records the explicit figure identifier linked to one Hc record. Notes: It appears only when the paper text explicitly links that Hc value to a specific figure and preserves the figure label as written."
material_info.section1.Hc.characteristics: "Data format: string. Concept: This key records additional distinguishing information for one Hc record that is not covered by the structured condition keys, such as sample type, criterion, or analysis method. Notes: It does not repeat the Hc value, temperature, pressure, direction, or figure information already recorded elsewhere in the same Hc record."

material_info.section1.P_sc: "Data format: array of objects. Concept: The information under this key records explicitly stated pressure values at which the primary superconducting system represented by primary_signature exhibits superconductivity. Notes: Each item represents one distinct superconducting-pressure record under a specific explicitly stated context. Because P_sc itself is the pressure value, this record has no separate pressure condition sub-key."
material_info.section1.P_sc.value: "Data format: string. Concept: This key records one pressure value at which superconductivity is reported, exactly as stated in the paper, including its original unit and any approximation symbols. Notes: Explicit ambient or zero pressure is recorded in the value itself rather than supplied as a default elsewhere."
material_info.section1.P_sc.temperature: "Data format: string. Concept: This key records the explicitly stated temperature for one superconducting-pressure record. Notes: It appears only when the paper explicitly states a temperature condition. If no temperature condition is stated, this key will be omitted."
material_info.section1.P_sc.magnetic_field: "Data format: string. Concept: This key records the explicitly stated applied magnetic field for one superconducting-pressure record. Notes: It appears only when the paper explicitly states a magnetic field condition. If no magnetic field condition is stated, this key will be omitted."
material_info.section1.P_sc.direction: "Data format: string. Concept: This key records the explicitly stated measurement direction or orientation for one superconducting-pressure record, copied as written in the paper. Notes: It preserves the original notation rather than a normalized direction label."
material_info.section1.P_sc.figure: "Data format: string. Concept: This key records the explicit figure identifier linked to one superconducting-pressure record. Notes: It appears only when the paper text explicitly links that P_sc value to a specific figure and preserves the figure label as written."
material_info.section1.P_sc.characteristics: "Data format: string. Concept: This key records additional distinguishing information for one superconducting-pressure record that is not covered by the structured condition keys, such as sample type, doping state, measurement method, criterion, or analysis method. Notes: It does not repeat the P_sc value, temperature, magnetic field, direction, or figure information already recorded elsewhere in the same superconducting-pressure record."

material_info.section1.P_nsc: "Data format: array of objects. Concept: The information under this key records explicitly stated pressure values at which the primary superconducting system represented by primary_signature is reported to be non-superconducting or to lose superconductivity. Notes: Each item represents one distinct non-superconducting-pressure record under a specific explicitly stated context. Because P_nsc itself is the pressure value, this record has no separate pressure condition sub-key."
material_info.section1.P_nsc.value: "Data format: string. Concept: This key records one pressure value at which superconductivity is absent or suppressed, exactly as stated in the paper, including its original unit and any approximation symbols."
material_info.section1.P_nsc.temperature: "Data format: string. Concept: This key records the explicitly stated temperature for one non-superconducting-pressure record. Notes: It appears only when the paper explicitly states a temperature condition. If no temperature condition is stated, this key will be omitted."
material_info.section1.P_nsc.magnetic_field: "Data format: string. Concept: This key records the explicitly stated applied magnetic field for one non-superconducting-pressure record. Notes: It appears only when the paper explicitly states a magnetic field condition. If no magnetic field condition is stated, this key will be omitted."
material_info.section1.P_nsc.direction: "Data format: string. Concept: This key records the explicitly stated measurement direction or orientation for one non-superconducting-pressure record, copied as written in the paper. Notes: It preserves the original notation rather than a normalized direction label."
material_info.section1.P_nsc.figure: "Data format: string. Concept: This key records the explicit figure identifier linked to one non-superconducting-pressure record. Notes: It appears only when the paper text explicitly links that P_nsc value to a specific figure and preserves the figure label as written."
material_info.section1.P_nsc.characteristics: "Data format: string. Concept: This key records additional distinguishing information for one non-superconducting-pressure record that is not covered by the structured condition keys, such as sample type, doping state, measurement method, criterion, or analysis method. Notes: It does not repeat the P_nsc value, temperature, magnetic field, direction, or figure information already recorded elsewhere in the same non-superconducting-pressure record."

material_info.section1.lambda: "Data format: array of objects. Concept: The information under this key records explicitly stated London penetration depth values for the primary superconducting system represented by primary_signature. Notes: Each item represents one distinct lambda record under a specific explicitly stated context."
material_info.section1.lambda.value: "Data format: string. Concept: This key records one penetration depth value exactly as stated in the paper, including its original unit and any approximation symbols."
material_info.section1.lambda.temperature: "Data format: string. Concept: This key records the explicitly stated measurement temperature for one lambda record. Notes: It appears only when the paper explicitly states a temperature condition. If no temperature condition is stated, this key will be omitted."
material_info.section1.lambda.magnetic_field: "Data format: string. Concept: This key records the explicitly stated applied magnetic field for one lambda record. Notes: It appears only when the paper explicitly states a magnetic field condition. If no magnetic field condition is stated, this key will be omitted."
material_info.section1.lambda.pressure: "Data format: string. Concept: This key records the explicitly stated applied pressure for one lambda record. Notes: It appears only when the paper explicitly states a pressure condition. If no pressure condition is stated, this key will be omitted."
material_info.section1.lambda.figure: "Data format: string. Concept: This key records the explicit figure identifier linked to one lambda record. Notes: It appears only when the paper text explicitly links that lambda value to a specific figure and preserves the figure label as written."
material_info.section1.lambda.characteristics: "Data format: string. Concept: This key records additional distinguishing information for one lambda record that is not covered by the structured condition keys, such as sample type, measurement method, effective lambda designation, or anisotropy direction. Notes: It does not repeat the lambda value, temperature, magnetic field, pressure, or figure information already recorded elsewhere in the same lambda record. For anisotropic lambda, direction information may appear here as a property qualifier rather than a measurement condition."

material_info.section1.xi: "Data format: array of objects. Concept: The information under this key records explicitly stated superconducting coherence length values for the primary superconducting system represented by primary_signature. Notes: Each item represents one distinct xi record under a specific explicitly stated context."
material_info.section1.xi.value: "Data format: string. Concept: This key records one coherence length value exactly as stated in the paper, including its original unit and any approximation symbols."
material_info.section1.xi.temperature: "Data format: string. Concept: This key records the explicitly stated measurement temperature for one xi record. Notes: It appears only when the paper explicitly states a temperature condition. If no temperature condition is stated, this key will be omitted."
material_info.section1.xi.magnetic_field: "Data format: string. Concept: This key records the explicitly stated applied magnetic field for one xi record. Notes: It appears only when the paper explicitly states a magnetic field condition. If no magnetic field condition is stated, this key will be omitted."
material_info.section1.xi.pressure: "Data format: string. Concept: This key records the explicitly stated applied pressure for one xi record. Notes: It appears only when the paper explicitly states a pressure condition. If no pressure condition is stated, this key will be omitted."
material_info.section1.xi.figure: "Data format: string. Concept: This key records the explicit figure identifier linked to one xi record. Notes: It appears only when the paper text explicitly links that xi value to a specific figure and preserves the figure label as written."
material_info.section1.xi.characteristics: "Data format: string. Concept: This key records additional distinguishing information for one xi record that is not covered by the structured condition keys, such as sample type, calculation source, criterion, analysis method, or anisotropy direction. Notes: It does not repeat the xi value, temperature, magnetic field, pressure, or figure information already recorded elsewhere in the same xi record. For anisotropic xi, direction information may appear here as a property qualifier rather than a measurement condition."

material_info.section2: "Data format: array of objects. Concept: The information under this key records explicitly stated fabrication or processing entries for the primary superconducting sample or device represented by primary_signature. Notes: Each item represents one distinct preparation route (growth process, synthesis entry, or processing entry) described in the paper."
material_info.section2.method: "Data format: string. Concept: This key records the method label for one fabrication entry, identifying the broad preparation route such as CVD, CVT, MBE, PVD, Solution, SSR, Flux, Melt, or Nano. Notes: It names the method category rather than describing the full procedure. The labels are abbreviations for the following categories: CVD (Chemical Vapor Deposition, e.g., Standard, PECVD, ALD), CVT (Chemical Vapor Transport, using transport agents), MBE (Molecular Beam Epitaxy, e.g., Laser-MBE, Hybrid-MBE), PVD (Physical Vapor Deposition, e.g., PLD, Sputtering, Evaporation), Solution (Solution-based, e.g., Sol-gel, Hydrothermal, Spin-coating), SSR (Solid-State Reaction, e.g., Sintering, HPHT, distinct from Flux), Flux (Flux Growth, e.g., Self-flux, solvent growth), Melt (Melt Growth, e.g., Arc Melting, Floating Zone, Bridgman), Nano (Nanofabrication & Exfoliation, e.g., Mechanical exfoliation, Transfer, Lithography, Device fabrication)."
material_info.section2.description: "Data format: string. Concept: This key records the explicitly stated fabrication or process description for one fabrication entry, using the paper's wording for how the primary superconducting sample or device was prepared. Notes: It is a verbatim or near-verbatim in-paper process description rather than a normalized summary, and it excludes background or literature-only fabrication statements."
material_info.section2.geometry: "Data format: array of strings. Concept: The information under this key records the explicitly stated form, shape, or dimensions of the superconducting sample or device associated with one fabrication entry. Notes: Multiple geometry strings may appear when the paper reports multiple sample geometries within one fabrication entry, and this key refers to the prepared superconducting sample or device rather than auxiliary substrates, targets, contacts, or controls unless the paper explicitly treats them as part of that sample or device."
material_info.section2.conditions: "Data format: object. Concept: The information under this key records the explicitly stated preparation conditions associated with one fabrication entry, such as temperature, time, pressure, atmosphere, composition ratio, thickness, or other reported process parameters. Notes: Only parameters explicitly stated in the paper appear. Values are recorded verbatim, a parameter may be a string or an array when multiple explicit values are reported, and the object may be empty when the paper gives a fabrication entry without detailed condition values."

material_info.section3: "Concept: This key stores microscopic characterization and electronic-structure information that is linked to specific figures within the paper. Notes: It contains characterization categories and their linked figure identifiers."
material_info.section3.crystal_structure_diagram: "Data format: object. Concept: This key stores figure-linked crystal-structure schematics mentioned in the paper. Notes: It refers to explicit structure diagrams such as ball-and-stick or polyhedral models, not diffraction results or microscopy images."
material_info.section3.crystal_structure_diagram.figure: "Data format: string or array of strings. Concept: This key stores the figure or panel identifier for a crystal-structure diagram. Notes: It may contain a single identifier or multiple identifiers. Panel-level identifiers are used when the paper explicitly distinguishes subfigures."
material_info.section3.crystal_structure_diagram.raw_data: "Data format: string. Concept: This key indicates whether explicit figure-level source data availability is stated for the corresponding crystal-structure diagram figure. Notes: If present, the value is yes. If source data availability is not explicitly stated for this figure, the key is absent."

material_info.section3.XRD: "Data format: object. Concept: This key stores figure-linked X-ray diffraction (XRD) results mentioned in the paper. Notes: It refers to diffraction data or result plots, not crystal-structure schematics."
material_info.section3.XRD.figure: "Data format: string or array of strings. Concept: This key stores the figure or panel identifier for XRD results, using the naming style found in the paper. Notes: It may contain a single identifier or multiple identifiers. Panel-level identifiers are used when the paper explicitly distinguishes subfigures."
material_info.section3.XRD.raw_data: "Data format: string. Concept: This key indicates whether explicit figure-level source data availability is stated for the corresponding XRD figure. Notes: If present, the value is yes. If source data availability is not explicitly stated for this figure, the key is absent."

material_info.section3.NMR: "Data format: object. Concept: This key stores figure-linked Nuclear Magnetic Resonance (NMR) or Nuclear Quadrupole Resonance (NQR) results mentioned in the paper. Notes: It refers explicitly to NMR or NQR measurement data, not to generic mentions of relaxation or spectral quantities without that context."
material_info.section3.NMR.figure: "Data format: string or array of strings. Concept: This key stores the figure or panel identifier for NMR/NQR results, using the naming style found in the paper. Notes: It may contain a single identifier or multiple identifiers. Panel-level identifiers are used when the paper explicitly distinguishes subfigures."
material_info.section3.NMR.raw_data: "Data format: string. Concept: This key indicates whether explicit figure-level source data availability is stated for the corresponding NMR/NQR figure. Notes: If present, the value is yes. If source data availability is not explicitly stated for this figure, the key is absent."

material_info.section3.AFM: "Data format: object. Concept: This key stores figure-linked Atomic Force Microscopy (AFM) results mentioned in the paper. Notes: It refers to AFM topography or related AFM-derived morphology results."
material_info.section3.AFM.figure: "Data format: string or array of strings. Concept: This key stores the figure or panel identifier for AFM results, using the naming style found in the paper. Notes: It may contain a single identifier or multiple identifiers. Panel-level identifiers are used when the paper explicitly distinguishes subfigures."
material_info.section3.AFM.raw_data: "Data format: string. Concept: This key indicates whether explicit figure-level source data availability is stated for the corresponding AFM figure. Notes: If present, the value is yes. If source data availability is not explicitly stated for this figure, the key is absent."

material_info.section3.SEM: "Data format: object. Concept: This key stores figure-linked Scanning Electron Microscopy (SEM) results mentioned in the paper. Notes: It refers to explicitly identified SEM images or morphology results, not to TEM, EDS, or optical images."
material_info.section3.SEM.figure: "Data format: string or array of strings. Concept: This key stores the figure or panel identifier for SEM results. Notes: It may contain a single identifier or multiple identifiers. Panel-level identifiers are used when the paper explicitly distinguishes subfigures."
material_info.section3.SEM.raw_data: "Data format: string. Concept: This key indicates whether explicit figure-level source data availability is stated for the corresponding SEM figure. Notes: If present, the value is yes. If source data availability is not explicitly stated for this figure, the key is absent."

material_info.section3.TEM: "Data format: object. Concept: The information under this key records figure-linked TEM-family results for the primary superconducting system represented by primary_signature. Notes: It may cover TEM, HRTEM, STEM, or SAED results when they are treated as transmission-electron-microscopy evidence."
material_info.section3.TEM.figure: "Data format: string or array of strings. Concept: This key stores the figure or panel identifier for TEM-family results, using the naming style found in the paper. Notes: It may contain a single identifier or multiple identifiers. Panel-level identifiers are used when the paper explicitly distinguishes subfigures."
material_info.section3.TEM.raw_data: "Data format: string. Concept: This key indicates whether explicit figure-level source data availability is stated for the corresponding TEM-family figure. Notes: If present, the value is yes. If source data availability is not explicitly stated for this figure, the key is absent."

material_info.section3.STM: "Data format: object. Concept: This key stores figure-linked Scanning Tunneling Microscopy (STM) topography results mentioned in the paper. Notes: It refers to tunneling microscopy images or topography, not to tunneling spectroscopy curves."
material_info.section3.STM.figure: "Data format: string or array of strings. Concept: This key stores the figure or panel identifier for STM topography results. Notes: It may contain a single identifier or multiple identifiers. Panel-level identifiers are used when the paper explicitly distinguishes subfigures."
material_info.section3.STM.raw_data: "Data format: string. Concept: This key indicates whether explicit figure-level source data availability is stated for the corresponding STM topography figure. Notes: If present, the value is yes. If source data availability is not explicitly stated for this figure, the key is absent."

material_info.section3.STS: "Data format: object. Concept: This key stores figure-linked Scanning Tunneling Spectroscopy (STS) results mentioned in the paper. Notes: It refers to tunneling spectroscopy such as dI/dV or differential-conductance spectra, not to STM topography images."
material_info.section3.STS.figure: "Data format: string or array of strings. Concept: This key stores the figure or panel identifier for STS results. Notes: It may contain a single identifier or multiple identifiers. Panel-level identifiers are used when the paper explicitly distinguishes subfigures."
material_info.section3.STS.raw_data: "Data format: string. Concept: This key indicates whether explicit figure-level source data availability is stated for the corresponding STS figure. Notes: If present, the value is yes. If source data availability is not explicitly stated for this figure, the key is absent."

material_info.section3.band_structure: "Data format: object. Concept: This key stores figure-linked band-structure results mentioned in the paper. Notes: It refers to E-E_F versus k plots along explicitly identified high-symmetry momentum paths, distinct from generic ARPES dispersion maps."
material_info.section3.band_structure.figure: "Data format: string or array of strings. Concept: This key stores the figure or panel identifier for band-structure results. Notes: It may contain a single identifier or multiple identifiers. Panel-level identifiers are used when the paper explicitly distinguishes subfigures."
material_info.section3.band_structure.raw_data: "Data format: string. Concept: This key indicates whether explicit figure-level source data availability is stated for the corresponding band-structure figure. Notes: If present, the value is yes. If source data availability is not explicitly stated for this figure, the key is absent."

material_info.section3.band_dispersion: "Data format: object. Concept: This key stores figure-linked band-dispersion results mentioned in the paper. Notes: It typically refers to ARPES E-k dispersion maps or intensity maps that are not defined as high-symmetry-path band structures."
material_info.section3.band_dispersion.figure: "Data format: string or array of strings. Concept: This key stores the figure or panel identifier for band-dispersion results. Notes: It may contain a single identifier or multiple identifiers. Panel-level identifiers are used when the paper explicitly distinguishes subfigures."
material_info.section3.band_dispersion.raw_data: "Data format: string. Concept: This key indicates whether explicit figure-level source data availability is stated for the corresponding band-dispersion figure. Notes: If present, the value is yes. If source data availability is not explicitly stated for this figure, the key is absent."

material_info.section3.EDC: "Data format: object. Concept: This key stores figure-linked Energy Distribution Curve (EDC) results mentioned in the paper. Notes: It refers to photoemission intensity versus binding energy at fixed momentum, distinct from MDC or STS spectra."
material_info.section3.EDC.figure: "Data format: string or array of strings. Concept: This key stores the figure or panel identifier for EDC results. Notes: It may contain a single identifier or multiple identifiers. Panel-level identifiers are used when the paper explicitly distinguishes subfigures."
material_info.section3.EDC.raw_data: "Data format: string. Concept: This key indicates whether explicit figure-level source data availability is stated for the corresponding EDC figure. Notes: If present, the value is yes. If source data availability is not explicitly stated for this figure, the key is absent."

material_info.section3.MDC: "Data format: object. Concept: This key stores figure-linked Momentum Distribution Curve (MDC) results mentioned in the paper. Notes: It refers to photoemission intensity versus momentum at fixed energy, distinct from generic ARPES dispersion maps."
material_info.section3.MDC.figure: "Data format: string or array of strings. Concept: This key stores the figure or panel identifier for MDC results. Notes: It may contain a single identifier or multiple identifiers. Panel-level identifiers are used when the paper explicitly distinguishes subfigures."
material_info.section3.MDC.raw_data: "Data format: string. Concept: This key indicates whether explicit figure-level source data availability is stated for the corresponding MDC figure. Notes: If present, the value is yes. If source data availability is not explicitly stated for this figure, the key is absent."

material_info.section3.fermi_surface: "Data format: object. Concept: This key stores figure-linked Fermi-surface results mentioned in the paper. Notes: It refers to momentum-space maps explicitly identified as Fermi-surface or Fermi-level maps, not generic ARPES maps."
material_info.section3.fermi_surface.figure: "Data format: string or array of strings. Concept: This key stores the figure or panel identifier for Fermi-surface results. Notes: It may contain a single identifier or multiple identifiers. Panel-level identifiers are used when the paper explicitly distinguishes subfigures."
material_info.section3.fermi_surface.raw_data: "Data format: string. Concept: This key indicates whether explicit figure-level source data availability is stated for the corresponding Fermi-surface figure. Notes: If present, the value is yes. If source data availability is not explicitly stated for this figure, the key is absent."

material_info.section3.others: "Data format: array of objects. Concept: This key stores additional figure-linked microscopic characterization or electronic-structure results mentioned in the paper that are not covered by the predefined keys (crystal_structure_diagram, XRD, NMR, AFM, SEM, TEM, STM, STS, band_structure, band_dispersion, EDC, MDC, fermi_surface). Notes: Each object in the array represents one such type of result (e.g., a Raman spectrum, an EDS map). Results fitting any predefined key are not recorded here."
material_info.section3.others.name: "Data format: string. Concept: This key stores the name of the specific characterization type for one entry in the array (e.g., Raman, EDS). Notes: It records the name of the result type, not a figure description."
material_info.section3.others.figure: "Data format: string or array of strings. Concept: This key stores the figure or panel identifier for one characterization entry. Notes: It may contain a single identifier or multiple identifiers. Panel-level identifiers are used when the paper explicitly distinguishes subfigures."
material_info.section3.others.raw_data: "Data format: string. Concept: This key indicates whether explicit figure-level source data availability is stated for the figure linked to one characterization entry. Notes: If present, the value is yes. If source data availability is not explicitly stated for this figure, the key is absent."

material_info.section4: "Concept: This key stores all physical property curve information extracted from the paper."
material_info.section4.R_T: "Data format: object or array of objects. Concept: Contains resistance-temperature (R-T) or resistivity-temperature (ρ-T) curve entries. Notes: One entry groups figures sharing identical conditions; distinct condition sets are separate entries."
material_info.section4.R_T.figure: "Data format: string or array of strings. Concept: The figure/panel identifier(s) for an R_T entry. Notes: An array is used if the same curve appears in multiple figures/panels."
material_info.section4.R_T.magnetic_field: "Data format: string or array of strings. Concept: The magnetic field value(s) for an R_T entry."
material_info.section4.R_T.magnetic_direction: "Data format: string or array of strings. Concept: The direction of the applied field for an R_T entry."
material_info.section4.R_T.magnetic_direction_reference: "Data format: string. Concept: Additional context clarifying the magnetic field direction. Notes: Recorded when the paper provides extra geometric or coordinate-system information."
material_info.section4.R_T.pressure: "Data format: string or array of strings. Concept: The pressure condition for an R_T entry. Notes: Explicit ambient/zero pressure is stored as \"0 GPa\". This key will be omitted if no pressure is stated."
material_info.section4.R_T.angles: "Data format: string or array of strings. Concept: The explicitly stated angle setting(s) for an R_T entry."
material_info.section4.R_T.angles_reference: "Data format: string. Concept: Definition of how the recorded angle is measured. Notes: Clarifies the angular reference system."
material_info.section4.R_T.current: "Data format: string or array of strings. Concept: The transport current condition for an R_T entry."
material_info.section4.R_T.current_direction: "Data format: string or array of strings. Concept: The direction of the transport current for an R_T entry."
material_info.section4.R_T.raw_data: "Data format: string. Concept: Indicates if figure-level source data availability is stated. Notes: Value is yes if present. Omitted if not explicitly stated."

material_info.section4.R_H: "Data format: object or array of objects. Concept: The information under this key records resistance-field, resistivity-field, magnetoresistance, or closely related field-sweep transport curve entries as extracted from the paper. Notes: One entry may group multiple figures when they share the same condition set, while distinct condition sets appear as separate entries."
material_info.section4.R_H.figure: "Data format: string or array of strings. Concept: This key records the figure or panel identifier linked to one R_H entry, using the paper's figure style. Notes: It may contain one identifier or multiple identifiers when the same R_H entry is represented in multiple figures or panels."
material_info.section4.R_H.temperature: "Data format: string or array of strings. Concept: This key records the temperature condition associated with one R_H entry. Notes: It records fixed temperature conditions for the field-sweep curve rather than an assumed default temperature."
material_info.section4.R_H.magnetic_field: "Data format: string or array of strings. Concept: This key records the magnetic-field condition associated with one R_H entry when such a fixed field condition is explicitly stated. Notes: It does not represent the swept field axis itself."
material_info.section4.R_H.magnetic_direction: "Data format: string or array of strings. Concept: This key records the applied magnetic-field direction associated with one R_H entry, using the paper's wording. Notes: It preserves the original notation rather than a normalized direction label."
material_info.section4.R_H.magnetic_direction_reference: "Data format: string. Concept: This key records additional contextual wording that clarifies the meaning of the recorded magnetic-field direction for one R_H entry."
material_info.section4.R_H.pressure: "Data format: string or array of strings. Concept: This key records the pressure condition associated with one R_H entry. Notes: Explicit ambient or zero pressure is normalized to 0 GPa, and pressure is omitted when no explicit pressure condition is stated."
material_info.section4.R_H.angles: "Data format: string or array of strings. Concept: This key records the explicitly stated angle setting associated with one R_H entry, using the paper's wording."
material_info.section4.R_H.angles_reference: "Data format: string. Concept: This key records additional wording that defines how the recorded angle is measured for one R_H entry."
material_info.section4.R_H.current: "Data format: string or array of strings. Concept: This key records the transport current condition associated with one R_H entry."
material_info.section4.R_H.current_direction: "Data format: string or array of strings. Concept: This key records the transport-current direction associated with the recorded current condition of one R_H entry, using the paper's wording."
material_info.section4.R_H.raw_data: "Data format: string. Concept: This key records whether explicit figure-level source data availability is stated for the figure linked to one R_H entry. Notes: When this key appears, its value is yes. If no related figure-level source data availability is explicitly stated, this key is omitted and no value is recorded."

material_info.section4.I_V: "Data format: object or array of objects. Concept: The information under this key records macroscopic current-voltage curve entries as extracted from the paper. Notes: It refers to transport I-V behavior rather than STM or STS spectroscopy."
material_info.section4.I_V.figure: "Data format: string or array of strings. Concept: This key records the figure or panel identifier linked to one I_V entry, using the paper's figure style. Notes: It may contain one identifier or multiple identifiers when the same I_V entry is represented in multiple figures or panels."
material_info.section4.I_V.temperature: "Data format: string or array of strings. Concept: This key records the temperature condition associated with one I_V entry."
material_info.section4.I_V.magnetic_field: "Data format: string or array of strings. Concept: This key records the magnetic-field condition associated with one I_V entry. Notes: It records fixed field conditions tied to the curve rather than an assumed default field value."
material_info.section4.I_V.magnetic_direction: "Data format: string or array of strings. Concept: This key records the applied magnetic-field direction associated with one I_V entry, using the paper's wording."
material_info.section4.I_V.magnetic_direction_reference: "Data format: string. Concept: This key records additional contextual wording that clarifies the meaning of the recorded magnetic-field direction for one I_V entry."
material_info.section4.I_V.pressure: "Data format: string or array of strings. Concept: This key records the pressure condition associated with one I_V entry. Notes: Explicit ambient or zero pressure is normalized to 0 GPa, and pressure is omitted when no explicit pressure condition is stated."
material_info.section4.I_V.angles: "Data format: string or array of strings. Concept: This key records the explicitly stated angle setting associated with one I_V entry, using the paper's wording."
material_info.section4.I_V.angles_reference: "Data format: string. Concept: This key records additional wording that defines how the recorded angle is measured for one I_V entry."
material_info.section4.I_V.current: "Data format: string or array of strings. Concept: This key records the transport current condition associated with one I_V entry when it is stated as a fixed condition."
material_info.section4.I_V.current_direction: "Data format: string or array of strings. Concept: This key records the transport-current direction associated with one I_V entry, using the paper's wording."
material_info.section4.I_V.raw_data: "Data format: string. Concept: This key records whether explicit figure-level source data availability is stated for the figure linked to one I_V entry. Notes: When this key appears, its value is yes. If no related figure-level source data availability is explicitly stated, this key is omitted and no value is recorded."

material_info.section4.specific_heat: "Data format: object or array of objects. Concept: The information under this key records specific-heat or heat-capacity curve entries as extracted from the paper. Notes: It covers heat-capacity representations such as C_p, C/T, or related forms under explicitly stated conditions."
material_info.section4.specific_heat.figure: "Data format: string or array of strings. Concept: This key records the figure or panel identifier linked to one specific_heat entry, using the paper's figure style."
material_info.section4.specific_heat.magnetic_field: "Data format: string or array of strings. Concept: This key records the magnetic-field condition associated with one specific_heat entry."
material_info.section4.specific_heat.magnetic_direction: "Data format: string or array of strings. Concept: This key records the applied magnetic-field direction associated with one specific_heat entry, using the paper's wording."
material_info.section4.specific_heat.magnetic_direction_reference: "Data format: string. Concept: This key records additional contextual wording that clarifies the meaning of the recorded magnetic-field direction for one specific_heat entry."
material_info.section4.specific_heat.pressure: "Data format: string or array of strings. Concept: This key records the pressure condition associated with one specific_heat entry. Notes: Explicit ambient or zero pressure is normalized to 0 GPa, and pressure is omitted when no explicit pressure condition is stated."
material_info.section4.specific_heat.angles: "Data format: string or array of strings. Concept: This key records the explicitly stated angle setting associated with one specific_heat entry, using the paper's wording."
material_info.section4.specific_heat.angles_reference: "Data format: string. Concept: This key records additional wording that defines how the recorded angle is measured for one specific_heat entry."
material_info.section4.specific_heat.raw_data: "Data format: string. Concept: This key records whether explicit figure-level source data availability is stated for the figure linked to one specific_heat entry. Notes: When this key appears, its value is yes. If no related figure-level source data availability is explicitly stated, this key is omitted and no value is recorded."

material_info.section4.M_T: "Data format: object or array of objects. Concept: The information under this key records magnetic-moment or dc-susceptibility versus temperature curve entries as extracted from the paper. Notes: It covers M-T style magnetic response curves, including ZFC or FC information when stated."
material_info.section4.M_T.figure: "Data format: string or array of strings. Concept: This key records the figure or panel identifier linked to one M_T entry, using the paper's figure style."
material_info.section4.M_T.magnetic_field: "Data format: string or array of strings. Concept: This key records the applied magnetic-field condition associated with one M_T entry."
material_info.section4.M_T.magnetic_direction: "Data format: string or array of strings. Concept: This key records the applied magnetic-field direction associated with one M_T entry, using the paper's wording."
material_info.section4.M_T.magnetic_direction_reference: "Data format: string. Concept: This key records additional contextual wording that clarifies the meaning of the recorded magnetic-field direction for one M_T entry."
material_info.section4.M_T.pressure: "Data format: string or array of strings. Concept: This key records the pressure condition associated with one M_T entry. Notes: Explicit ambient or zero pressure is normalized to 0 GPa, and pressure is omitted when no explicit pressure condition is stated."
material_info.section4.M_T.angles: "Data format: string or array of strings. Concept: This key records the explicitly stated angle setting associated with one M_T entry, using the paper's wording."
material_info.section4.M_T.angles_reference: "Data format: string. Concept: This key records additional wording that defines how the recorded angle is measured for one M_T entry."
material_info.section4.M_T.field_cooling: "Data format: string or array of strings. Concept: This key records the field-cooling protocol associated with one M_T entry, such as ZFC or FC. Notes: It records the stated measurement protocol rather than a field value."
material_info.section4.M_T.magnetometer: "Data format: string or array of strings. Concept: This key records the instrument or magnetometer type used for one M_T entry, such as SQUID or VSM."
material_info.section4.M_T.raw_data: "Data format: string. Concept: This key records whether explicit figure-level source data availability is stated for the figure linked to one M_T entry. Notes: When this key appears, its value is yes. If no related figure-level source data availability is explicitly stated, this key is omitted and no value is recorded."

material_info.section4.chi_T: "Data format: object or array of objects. Concept: The information under this key records ac-susceptibility versus temperature curve entries as extracted from the paper. Notes: It covers chi-T style ac magnetic response curves, including excitation frequency when stated."
material_info.section4.chi_T.figure: "Data format: string or array of strings. Concept: This key records the figure or panel identifier linked to one chi_T entry, using the paper's figure style."
material_info.section4.chi_T.magnetic_field: "Data format: string or array of strings. Concept: This key records the applied magnetic-field condition associated with one chi_T entry."
material_info.section4.chi_T.magnetic_direction: "Data format: string or array of strings. Concept: This key records the applied magnetic-field direction associated with one chi_T entry, using the paper's wording."
material_info.section4.chi_T.magnetic_direction_reference: "Data format: string. Concept: This key records additional contextual wording that clarifies the meaning of the recorded magnetic-field direction for one chi_T entry."
material_info.section4.chi_T.pressure: "Data format: string or array of strings. Concept: This key records the pressure condition associated with one chi_T entry. Notes: Explicit ambient or zero pressure is normalized to 0 GPa, and pressure is omitted when no explicit pressure condition is stated."
material_info.section4.chi_T.angles: "Data format: string or array of strings. Concept: This key records the explicitly stated angle setting associated with one chi_T entry, using the paper's wording."
material_info.section4.chi_T.angles_reference: "Data format: string. Concept: This key records additional wording that defines how the recorded angle is measured for one chi_T entry."
material_info.section4.chi_T.frequency: "Data format: string or array of strings. Concept: This key records the ac excitation frequency associated with one chi_T entry, using the paper's wording and units."
material_info.section4.chi_T.raw_data: "Data format: string. Concept: This key records whether explicit figure-level source data availability is stated for the figure linked to one chi_T entry. Notes: When this key appears, its value is yes. If no related figure-level source data availability is explicitly stated, this key is omitted and no value is recorded."

material_info.section4.PDO: "Data format: object or array of objects. Concept: The information under this key records proximity-detection-oscillator curve entries as extracted from the paper. Notes: It covers PDO frequency-shift style curves versus temperature or magnetic field."
material_info.section4.PDO.figure: "Data format: string or array of strings. Concept: This key records the figure or panel identifier linked to one PDO entry, using the paper's figure style."
material_info.section4.PDO.variable: "Data format: string. Concept: This key records the swept x-axis variable for one PDO entry, either temperature or magnetic_field. Notes: It identifies the axis being varied, so that swept variable is not repeated as a fixed condition key in the same entry."
material_info.section4.PDO.temperature: "Data format: string or array of strings. Concept: This key records the fixed temperature condition associated with one PDO entry when temperature is not the swept variable."
material_info.section4.PDO.magnetic_field: "Data format: string or array of strings. Concept: This key records the fixed magnetic-field condition associated with one PDO entry when magnetic field is not the swept variable."
material_info.section4.PDO.magnetic_direction: "Data format: string or array of strings. Concept: This key records the applied magnetic-field direction associated with one PDO entry, using the paper's wording."
material_info.section4.PDO.magnetic_direction_reference: "Data format: string. Concept: This key records additional contextual wording that clarifies the meaning of the recorded magnetic-field direction for one PDO entry."
material_info.section4.PDO.pressure: "Data format: string or array of strings. Concept: This key records the pressure condition associated with one PDO entry. Notes: Explicit ambient or zero pressure is normalized to 0 GPa, and pressure is omitted when no explicit pressure condition is stated."
material_info.section4.PDO.angles: "Data format: string or array of strings. Concept: This key records the explicitly stated angle setting associated with one PDO entry, using the paper's wording."
material_info.section4.PDO.angles_reference: "Data format: string. Concept: This key records additional wording that defines how the recorded angle is measured for one PDO entry."
material_info.section4.PDO.current: "Data format: string or array of strings. Concept: This key records the transport current condition associated with one PDO entry when it is explicitly stated."
material_info.section4.PDO.current_direction: "Data format: string or array of strings. Concept: This key records the transport-current direction associated with one PDO entry, using the paper's wording."
material_info.section4.PDO.raw_data: "Data format: string. Concept: This key records whether explicit figure-level source data availability is stated for the figure linked to one PDO entry. Notes: When this key appears, its value is yes. If no related figure-level source data availability is explicitly stated, this key is omitted and no value is recorded."

material_info.section4.thermal_conductivity: "Data format: object or array of objects. Concept: The information under this key records thermal-conductivity curve entries as extracted from the paper. Notes: It covers kappa-style curves versus temperature or magnetic field under explicitly stated conditions."
material_info.section4.thermal_conductivity.figure: "Data format: string or array of strings. Concept: This key records the figure or panel identifier linked to one thermal_conductivity entry, using the paper's figure style."
material_info.section4.thermal_conductivity.variable: "Data format: string. Concept: This key records the swept x-axis variable for one thermal_conductivity entry, either temperature or magnetic_field. Notes: It identifies the axis being varied, so that swept variable is not repeated as a fixed condition key in the same entry."
material_info.section4.thermal_conductivity.temperature: "Data format: string or array of strings. Concept: This key records the fixed temperature condition associated with one thermal_conductivity entry when temperature is not the swept variable."
material_info.section4.thermal_conductivity.magnetic_field: "Data format: string or array of strings. Concept: This key records the fixed magnetic-field condition associated with one thermal_conductivity entry when magnetic field is not the swept variable."
material_info.section4.thermal_conductivity.magnetic_direction: "Data format: string or array of strings. Concept: This key records the applied magnetic-field direction associated with one thermal_conductivity entry, using the paper's wording."
material_info.section4.thermal_conductivity.magnetic_direction_reference: "Data format: string. Concept: This key records additional contextual wording that clarifies the meaning of the recorded magnetic-field direction for one thermal_conductivity entry."
material_info.section4.thermal_conductivity.pressure: "Data format: string or array of strings. Concept: This key records the pressure condition associated with one thermal_conductivity entry. Notes: Explicit ambient or zero pressure is normalized to 0 GPa, and pressure is omitted when no explicit pressure condition is stated."
material_info.section4.thermal_conductivity.angles: "Data format: string or array of strings. Concept: This key records the explicitly stated angle setting associated with one thermal_conductivity entry, using the paper's wording."
material_info.section4.thermal_conductivity.angles_reference: "Data format: string. Concept: This key records additional wording that defines how the recorded angle is measured for one thermal_conductivity entry."
material_info.section4.thermal_conductivity.current: "Data format: string or array of strings. Concept: This key records the transport current or heat-current related condition associated with one thermal_conductivity entry when it is explicitly stated in the paper's wording."
material_info.section4.thermal_conductivity.current_direction: "Data format: string or array of strings. Concept: This key records the current or heat-current direction associated with one thermal_conductivity entry, using the paper's wording."
material_info.section4.thermal_conductivity.raw_data: "Data format: string. Concept: This key records whether explicit figure-level source data availability is stated for the figure linked to one thermal_conductivity entry. Notes: When this key appears, its value is yes. If no related figure-level source data availability is explicitly stated, this key is omitted and no value is recorded."

material_info.section4.nernst_effect: "Data format: object or array of objects. Concept: The information under this key records Nernst-effect curve entries as extracted from the paper. Notes: It covers Nernst signal style curves versus temperature or magnetic field under explicitly stated conditions."
material_info.section4.nernst_effect.figure: "Data format: string or array of strings. Concept: This key records the figure or panel identifier linked to one nernst_effect entry, using the paper's figure style."
material_info.section4.nernst_effect.signal: "Data format: string. Concept: This key records the Nernst quantity name used on the y-axis for one nernst_effect entry, such as e_N, ν, or Nernst signal."
material_info.section4.nernst_effect.variable: "Data format: string. Concept: This key records the swept x-axis variable for one nernst_effect entry, either temperature or magnetic_field. Notes: It identifies the axis being varied, so that swept variable is not repeated as a fixed condition key in the same entry."
material_info.section4.nernst_effect.temperature: "Data format: string or array of strings. Concept: This key records the fixed temperature condition associated with one nernst_effect entry when temperature is not the swept variable."
material_info.section4.nernst_effect.magnetic_field: "Data format: string or array of strings. Concept: This key records the fixed magnetic-field condition associated with one nernst_effect entry when magnetic field is not the swept variable."
material_info.section4.nernst_effect.magnetic_direction: "Data format: string or array of strings. Concept: This key records the applied magnetic-field direction associated with one nernst_effect entry, using the paper's wording."
material_info.section4.nernst_effect.magnetic_direction_reference: "Data format: string. Concept: This key records additional contextual wording that clarifies the meaning of the recorded magnetic-field direction for one nernst_effect entry."
material_info.section4.nernst_effect.pressure: "Data format: string or array of strings. Concept: This key records the pressure condition associated with one nernst_effect entry. Notes: Explicit ambient or zero pressure is normalized to 0 GPa, and pressure is omitted when no explicit pressure condition is stated."
material_info.section4.nernst_effect.angles: "Data format: string or array of strings. Concept: This key records the explicitly stated angle setting associated with one nernst_effect entry, using the paper's wording."
material_info.section4.nernst_effect.angles_reference: "Data format: string. Concept: This key records additional wording that defines how the recorded angle is measured for one nernst_effect entry."
material_info.section4.nernst_effect.current: "Data format: string or array of strings. Concept: This key records the current condition associated with one nernst_effect entry when it is explicitly stated."
material_info.section4.nernst_effect.current_direction: "Data format: string or array of strings. Concept: This key records the current direction associated with one nernst_effect entry, using the paper's wording."
material_info.section4.nernst_effect.raw_data: "Data format: string. Concept: This key records whether explicit figure-level source data availability is stated for the figure linked to one nernst_effect entry. Notes: When this key appears, its value is yes. If no related figure-level source data availability is explicitly stated, this key is omitted and no value is recorded."

material_info.section4.others: "Data format: array of objects. Concept: The information under this key records additional superconductivity-relevant physical-property curve entries as extracted from the paper that fall outside the predefined section4 keys. Notes: Each item represents one distinct additional curve type such as Hc2_T, Jc_H, Hc1_T, or Seebeck."
material_info.section4.others.name: "Data format: string. Concept: This key records the short standardized name assigned to one additional section4 curve entry, such as Hc2_T or Jc_H. Notes: It is a curve-type label rather than a figure description."
material_info.section4.others.figure: "Data format: string or array of strings. Concept: This key records the figure or panel identifier linked to one additional section4 curve entry, using the paper's figure style."
material_info.section4.others.detail: "Data format: object. Concept: The information under this key records the concise structural description of one additional section4 curve entry, including its axes, key conditions, and main result."
material_info.section4.others.detail.independent_variable: "Data format: string. Concept: This key records the x-axis quantity for one additional section4 curve entry, including unit when stated."
material_info.section4.others.detail.dependent_variable: "Data format: string. Concept: This key records the y-axis quantity for one additional section4 curve entry, including unit when stated."
material_info.section4.others.detail.conditions: "Data format: string. Concept: This key records the concise explicitly stated condition summary for one additional section4 curve entry, such as direction, pressure, criterion, or fit method. Notes: It summarizes conditions tied to that curve rather than general paper-level context."
material_info.section4.others.detail.result: "Data format: string. Concept: This key records the concise main observation or conclusion associated with one additional section4 curve entry."
material_info.section4.others.raw_data: "Data format: string. Concept: This key records whether explicit figure-level source data availability is stated for the figure linked to one additional section4 curve entry. Notes: When this key appears, its value is yes. If no related figure-level source data availability is explicitly stated, this key is omitted and no value is recorded."

# ===== Theory and Mechanism =====
section5.gap_symmetry: "Data format: string or array of strings. Concept: This key records the explicitly stated superconducting gap symmetry or pairing-symmetry label discussed for the superconducting system studied in the paper. Notes: It records symmetry labels or representations as written in the paper, such as s-wave, d-wave, chiral p-wave, A1g, or d_{x^2-y^2}, and it does not include qualitative gap descriptors that are not stated as explicit symmetry labels."
section5.pairing_mechanism: "Data format: string or array of strings. Concept: This key records the explicitly stated superconducting pairing mechanism proposed, argued for, or seriously discussed for the superconducting system studied in the paper. Notes: It records mechanism phrases as written in the paper, such as electron-phonon coupling or spin fluctuation, and it is used only when the paper explicitly links the mechanism to Cooper pairing in the studied system rather than mentioning it as general background or comparison."
section5.competing_orders: "Data format: string or array of strings. Concept: This key records explicitly stated non-superconducting ordered phases, states, or transitions that the paper identifies as competing with or coexisting with superconductivity in the studied system. Notes: It records each order as written in the paper, such as charge density wave, antiferromagnetic order, or nematic order, and it excludes background-only mentions or fluctuation language that is not treated as an established competing or coexisting order."
section5.calculation_method: "Data format: string or array of strings. Concept: This key records explicitly stated theoretical, phenomenological, analytical, or computational methods that the paper uses to calculate, fit, scale, or interpret superconducting properties. Notes: It records method names as written in the paper, such as density functional theory, Eliashberg theory, two-fluid model, or WHH theory, and it excludes methods mentioned only for background or general-purpose software tools."
section5.theoretical_keywords: "Data format: array of strings. Concept: The information under this key records short theory- or mechanism-related technical terms explicitly emphasized by the paper for the studied superconducting system when they do not belong under gap_symmetry, pairing_mechanism, competing_orders, or calculation_method. Notes: Each item is a short technical noun phrase copied from the paper's wording, and this key serves as a strict fallback list rather than a general catch-all vocabulary list."
section5.discussion_and_analysis: "Data format: string. Concept: This key records the paper's explicit theory- and mechanism-focused discussion, interpretation, conclusions, and stated open questions about superconductivity in the studied system. Notes: It is a concise synthesis that stays close to the paper's original wording and meaning, preserves stated uncertainty such as suggest, may, or remain unclear, and may contain multiple bullet-style points within one string when the paper presents separate arguments that should not be merged."

# ===== Paper Information =====
paper_info.metadata: "Concept: The information under this key records standard bibliographic metadata for the paper."
paper_info.metadata.title: "Data format: string. Concept: This key records the title of the paper."
paper_info.metadata.year: "Data format: string. Concept: This key records the publication year of the paper."
paper_info.metadata.paper_type: "Data format: string. Concept: This key records the paper type, such as review, experimental, device."
paper_info.metadata.doi: "Data format: string. Concept: This key records the DOI of the paper."
paper_info.metadata.arxiv_id: "Data format: string. Concept: This key records the arXiv identifier of the paper."
paper_info.metadata.url: "Data format: string. Concept: This key records the main URL of the paper."
paper_info.metadata.venue: "Data format: string. Concept: This key records the journal, conference, or other publication venue of the paper."

paper_info.resources: "Concept: The information under this key records paper-level resource availability information explicitly stated in the paper, including scientific software, code, raw data, and CIF or crystallographic structure-file availability. Notes: Resource items are organized by resource type, and the same resource is recorded under the most specific matching key rather than duplicated across software, code, raw_data, and cif."
paper_info.resources.software: "Data format: string or array of strings. Concept: This key records software packages explicitly stated as being used for numerical calculation, simulation, or theoretical modeling in the paper. Notes: It records software names such as Quantum Espresso, VASP, or Wannier90, and it does not record code-availability statements, raw-data resources, CIF deposits, or general-purpose libraries unless the paper explicitly treats them as the scientific software used in the work."
paper_info.resources.code: "Data format: object or array of objects. Concept: The information under this key records explicitly stated code availability for the paper, including analysis scripts, simulation code, or other author-provided code resources. Notes: One item represents one distinct code resource, and multiple items appear when the paper describes multiple separate code resources."
paper_info.resources.code.type: "Data format: string. Concept: This key records the explicitly stated type or role of one code resource, such as analysis scripts or simulation code. Notes: It describes what the code resource is rather than where it is hosted."
paper_info.resources.code.availability: "Data format: string. Concept: This key records whether one code resource is explicitly stated to be available. Notes: When this key appears, its value is yes. If the paper does not explicitly state code availability, this key is omitted and no value is recorded."
paper_info.resources.code.link: "Data format: string or array of strings. Concept: This key records the explicit repository or archive link for one code resource, such as a GitHub, GitLab, Zenodo, Figshare, or OSF URL. Notes: It records only links explicitly associated with code availability and excludes unrelated publisher, DOI, or general website links."
paper_info.resources.code.notes: "Data format: string. Concept: This key records a brief explicitly stated context for one code resource, such as Code availability, Supplementary information, or another paper section naming where the code is referenced."
paper_info.resources.raw_data: "Data format: object or array of objects. Concept: The information under this key records explicitly stated availability of raw data, source data, or data underlying the findings in the paper. Notes: One item represents one distinct raw-data resource, and CIF or crystallographic structure files are recorded under cif instead of this raw_data key."
paper_info.resources.raw_data.type: "Data format: string. Concept: This key records the explicitly stated raw-data type for one raw-data resource, such as source data for a figure or raw diffraction data. Notes: It uses the paper's wording for the data type rather than a normalized category label."
paper_info.resources.raw_data.availability: "Data format: string. Concept: This key records whether one raw-data resource is explicitly stated to be available. Notes: When this key appears, its value is yes. If the paper does not explicitly state raw-data availability, this key is omitted and no value is recorded."
paper_info.resources.raw_data.link: "Data format: string or array of strings. Concept: This key records the explicit dataset or archive link for one raw-data resource, such as a Zenodo, Figshare, Dryad, OSF, or other author-provided dataset page URL. Notes: It records only links explicitly associated with raw-data availability and excludes unrelated publisher, DOI, or general website links."
paper_info.resources.raw_data.notes: "Data format: string. Concept: This key records a brief explicitly stated context for one raw-data resource, such as a figure caption, Data availability statement, or Supplementary information reference."
paper_info.resources.cif: "Data format: object or array of objects. Concept: The information under this key records explicitly stated availability or deposition of CIF files or other crystallographic structure files for the paper. Notes: One item represents one distinct CIF or structure-file resource, and this key is used for crystallographic deposits rather than general raw-data resources."
paper_info.resources.cif.availability: "Data format: string. Concept: This key records whether one CIF or crystallographic structure-file resource is explicitly stated to be available or deposited. Notes: When this key appears, its value is yes. If the paper does not explicitly state CIF or structure-file availability, this key is omitted and no value is recorded."
paper_info.resources.cif.repository: "Data format: string. Concept: This key records the named repository or database for one CIF or crystallographic structure-file resource, such as CCDC or ICSD."
paper_info.resources.cif.identifier: "Data format: string or array of strings. Concept: This key records the explicit deposition number, accession identifier, or identifier set for one CIF or crystallographic structure-file resource exactly as stated in the paper."
paper_info.resources.cif.link: "Data format: string or array of strings. Concept: This key records the explicit repository landing-page link for one CIF or crystallographic structure-file resource when such a link is provided in the paper. Notes: It records only explicitly provided repository links and does not imply or construct a link from the repository name or identifier alone."
paper_info.resources.cif.notes: "Data format: string. Concept: This key records a brief explicitly stated context for one CIF or crystallographic structure-file resource, such as Data availability, Supplementary information, or another paper section naming where the deposit is referenced."